name: CI/CD

# Branch flow (mandated): feature/* → PR → develop (staging) → main (production).
# Required checks (test job) gate every PR; branch protection on develop + main.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint + typecheck + test across all workspaces. Runs on every push & PR.
  #    This is the required status check for merging.
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    # Real Postgres + Redis so the engine's atomic-claim / no-double-execution
    # tests exercise actual SQL atomicity (design 03 §12, approved decision D).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flowlet
          POSTGRES_PASSWORD: flowlet
          POSTGRES_DB: flowlet_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U flowlet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://flowlet:flowlet@localhost:5432/flowlet_test
      TEST_REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test (incl. tenant-isolation + no-double-execution gates)
        run: npm test

  # ---------------------------------------------------------------------------
  # 2. Build & push images to GHCR. Only on pushes to develop/main (not PRs).
  #    Tag with BOTH the git SHA (rollback target) and an env tag (PLAYBOOK §3).
  # ---------------------------------------------------------------------------
  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase image base
        run: echo "IMAGE_BASE=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Compute env tag
        run: echo "ENV_TAG=${{ github.ref == 'refs/heads/main' && 'latest' || 'staging' }}" >> "$GITHUB_ENV"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-api:${{ env.ENV_TAG }}
      - name: Build & push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-worker:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-worker:${{ env.ENV_TAG }}
      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-web:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-web:${{ env.ENV_TAG }}
      - name: Build & push migrate (shell migrator)
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: web/Dockerfile.migrate
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-migrate:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-migrate:${{ env.ENV_TAG }}
      - name: Build & push migrate-engine (engine migrator)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile.migrate
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-migrate-engine:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-migrate-engine:${{ env.ENV_TAG }}

  # ---------------------------------------------------------------------------
  # 3a. Deploy to STAGING automatically on develop.
  # ---------------------------------------------------------------------------
  deploy-staging:
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy
        run: echo "TODO: ssh → write escaped .env → docker compose -f docker-compose.staging.yml run --rm migrate → up -d. Infra not provisioned yet."

  deploy-production:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Copy compose files via scp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/"
          target: "/home/${{ secrets.USERNAME }}/flowlet"
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APP_URL: ${{ secrets.APP_URL || format('http://{0}', secrets.HOST) }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          CREDENTIALS_ENC_KEY: ${{ secrets.CREDENTIALS_ENC_KEY }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          timeout: 30m
          command_timeout: 30m
          envs: DATABASE_URL,GEMINI_API_KEY,APP_URL,JWT_ACCESS_SECRET,JWT_REFRESH_SECRET,CREDENTIALS_ENC_KEY
          script: |
            set -e
            cd /home/${{ secrets.USERNAME }}/flowlet
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export IMAGE_BASE="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
            export IMAGE_TAG="latest"
            
            # The sed 's/\$/$$/g' replaces $ with $$ to prevent Docker Compose from destroying passwords!
            echo "DATABASE_URL=$(echo "$DATABASE_URL" | sed 's/\$/$$/g')" > .env
            echo "GEMINI_API_KEY=$(echo "$GEMINI_API_KEY" | sed 's/\$/$$/g')" >> .env
            echo "APP_URL=$(echo "$APP_URL" | sed 's/\$/$$/g')" >> .env
            echo "JWT_ACCESS_SECRET=$(echo "$JWT_ACCESS_SECRET" | sed 's/\$/$$/g')" >> .env
            echo "JWT_REFRESH_SECRET=$(echo "$JWT_REFRESH_SECRET" | sed 's/\$/$$/g')" >> .env
            echo "CREDENTIALS_ENC_KEY=$(echo "$CREDENTIALS_ENC_KEY" | sed 's/\$/$$/g')" >> .env
            echo "IMAGE_BASE=$(echo "$IMAGE_BASE" | sed 's/\$/$$/g')" >> .env
            echo "IMAGE_TAG=$(echo "$IMAGE_TAG" | sed 's/\$/$$/g')" >> .env
            
            docker compose -f docker-compose.prod.yml --profile migrate pull
            docker compose -f docker-compose.prod.yml run --rm migrate
            docker compose -f docker-compose.prod.yml run --rm migrate-engine
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -af
