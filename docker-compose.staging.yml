# Flowlet — staging stack. Same shape as prod, but pulls the :staging image tag
# and serves plain HTTP (behind the platform LB). Deploy from the `develop` branch.
#   docker compose -f docker-compose.staging.yml --profile migrate run --rm migrate
#   docker compose -f docker-compose.staging.yml up -d --remove-orphans
services:
  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: ghcr.io/${IMAGE_BASE}-migrate:${IMAGE_TAG:-staging}
    environment:
      DATABASE_URL: ${DATABASE_URL}
    profiles: ["migrate"]
    restart: "no"

  migrate-engine:
    image: ghcr.io/${IMAGE_BASE}-migrate-engine:${IMAGE_TAG:-staging}
    environment:
      DATABASE_URL: ${DATABASE_URL}
    profiles: ["migrate"]
    restart: "no"

  api:
    image: ghcr.io/${IMAGE_BASE}-api:${IMAGE_TAG:-staging}
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      QUEUE_PREFIX: ${QUEUE_PREFIX:-flowlet}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    image: ghcr.io/${IMAGE_BASE}-worker:${IMAGE_TAG:-staging}
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      QUEUE_PREFIX: ${QUEUE_PREFIX:-flowlet}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
      AI_QUEUE_CONCURRENCY: ${AI_QUEUE_CONCURRENCY:-5}
      PER_USER_CONCURRENCY: ${PER_USER_CONCURRENCY:-3}
      STEP_TIMEOUT_MS: ${STEP_TIMEOUT_MS:-30000}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-claude-opus-4-8}
      LLM_RATE_LIMIT_PER_USER: ${LLM_RATE_LIMIT_PER_USER:-60}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/${IMAGE_BASE}-web:${IMAGE_TAG:-staging}
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redisdata:
