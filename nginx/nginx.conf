# Flowlet nginx — reverse proxy (local dev, HTTP).
# Prod adds TLS (see nginx/nginx.prod.conf). Longest-prefix location wins, so the
# auth/workspace routes stay on web/ while the rest of /api/ goes to Fastify.
worker_processes auto;
events { worker_connections 1024; }

http {
  # First-line rate limiting at the edge:
  #  - webhooks: bursty inbound triggers, keyed per client IP.
  #  - general API: coarse ceiling. Per-user LLM limits live at the app layer.
  limit_req_zone $binary_remote_addr zone=webhooks:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;

  upstream web { server web:3000; }
  upstream api { server api:3001; }

  server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Auth + workspace endpoints are owned by web/ (Next.js issues the JWTs).
    location /api/auth/ { proxy_pass http://web; }
    location /api/workspaces/ { proxy_pass http://web; }

    # Inbound webhook triggers → Fastify, rate-limited at the edge.
    location /api/webhooks/ {
      limit_req zone=webhooks burst=40 nodelay;
      proxy_pass http://api;
    }

    # Everything else under /api/ → Fastify (workflows, runs, connections).
    location /api/ {
      limit_req zone=api burst=100 nodelay;
      proxy_pass http://api;
    }

    # UI + everything else → Next.js.
    location / { proxy_pass http://web; }
  }
}
