# Flowlet nginx — production. TLS termination + HTTP→HTTPS redirect + edge rate
# limiting. Certs mounted at /etc/nginx/certs (Let's Encrypt/certbot or ALB+ACM).
worker_processes auto;
events { worker_connections 1024; }

http {
  limit_req_zone $binary_remote_addr zone=webhooks:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;

  upstream web { server web:3000; }
  upstream api { server api:3001; }

  # Redirect all HTTP to HTTPS.
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/auth/ { proxy_pass http://web; }
    location /api/workspaces/ { proxy_pass http://web; }

    location /api/webhooks/ {
      limit_req zone=webhooks burst=40 nodelay;
      proxy_pass http://api;
    }

    location /api/ {
      limit_req zone=api burst=100 nodelay;
      proxy_pass http://api;
    }

    location / { proxy_pass http://web; }
  }
}
